<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/index.css">
</head>

<body>
    <header class="header bg-nebula">
        <div class="container d-flex j-content-s-between a-items-center nav">

            <h1 class="logo no-margin">Nebula Store</h1>

            <nav>
                <ul class="list d-flex g-8 no-margin">
                    <li><a href="#" class="nav-link active">Inicio</a></li>
                    <li><a href="#" class="nav-link">Categorías</a></li>
                    <li><a href="#" class="nav-link">Zona Gamer</a></li>
                    <li><a href="#" class="nav-link">Contacto</a></li>
                </ul>
            </nav>

            <div class="d-flex g-4">
                <a href="#" class="icon-link">🛒</a>
                <a href="#" class="icon-link">👤</a>
            </div>

        </div>
    </header>
    <main>
        <section class="hero d-flex a-items-center">
            <div class="container hero-wrapper d-flex a-items-center">

                <div class="hero-content">
                    <span class="hero-subtitle">Future Technology Now</span>
                    <h2 class="hero-title">
                        Eleva tu <span class="text-gradient">nivel</span>
                    </h2>
                    <p class="hero-description">
                        Descubre la nueva frontera del rendimiento.
                        Equipamiento de élite diseñado para los arquitectos del mañana.
                    </p>
                    <div class="hero-actions d-flex g-4">
                        <a href="#" class="btn btn-primary">Explorar Tienda</a>
                        <a href="#" class="btn btn-secondary">Ver Novedades</a>
                    </div>
                </div>

            </div>
        </section>
        <section class="categories container">
            <div class="category-grid d-flex j-content-s-between">

                <div class="category-card" style="background-image: url('./images/componentes.jpg');">
                    <div class="category-info d-flex a-items-center j-content-s-between">
                        <span class="category-name">Componentes</span>
                        <span class="category-arrow">→</span>
                    </div>
                </div>

                <div class="category-card" style="background-image: url('./img/perifericos.jpg');">
                    <div class="category-info d-flex a-items-center j-content-s-between">
                        <span class="category-name">Periféricos</span>
                        <span class="category-arrow">→</span>
                    </div>
                </div>

                <div class="category-card" style="background-image: url('./img/laptops.jpg');">
                    <div class="category-info d-flex a-items-center j-content-s-between">
                        <span class="category-name">Laptops</span>
                        <span class="category-arrow">→</span>
                    </div>
                </div>

                <div class="category-card" style="background-image: url('./img/monitores.jpg');">
                    <div class="category-info d-flex a-items-center j-content-s-between">
                        <span class="category-name">Monitores</span>
                        <span class="category-arrow">→</span>
                    </div>
                </div>

            </div>
        </section>
    </main>
</body>

</html>
